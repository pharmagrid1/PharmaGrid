<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-brand">✦ PharmaGrid</div>
        <h2>Create account</h2>
        <p class="auth-sub">Join PharmaGrid today</p>

        @if(error){
            <div class="auth-error">{{error}}</div>
        }

        <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="field">
                <label>Full Name</label>
                <input type="text"  formControlName="full_name" placeholder="Your Name" />
            </div>

            <div class="field">
                <label>Email</label>
                <input type="email"  formControlName="email" placeholder="you@email.com" />
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password"  formControlName="password" placeholder="Min. 6 characters" />
            </div>

            <button type="submit" [disabled]="loading">
                {{loading? 'Creating account...' : 'Create Account' }}    
            </button>
        </form>
    

        <p class="auth-switch">
            Already have an account?  <a routerLink="/login">Sign in</a>
        </p>
    </div>
</div>
