<div class="checkout-wrapper">
    <div class="checkout-header">
        <h2> Checkout </h2>
        <p class="subtitle">Complete your order</p>
    </div>

    <div class="checkout-layout">
        <div class="form-section">
            <form [formGroup]="checkoutForm" (ngSubmit)="placeOrder()">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" formControlName="customerName" placeholder="Full Name"/>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" formControlName="email" placeholder="you@email.com"/>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" formControlName="phone" placeholder="+389 70 123 456"/>
                    </div>
                </div>

                <div class="form-group">
                    <label>Delivery Address</label>
                        <input type="text" formControlName="address" placeholder="Street, City"/>
                </div>

                <div class="form-group">
                    <label> Delivery Method </label>
                    <div class="delivery-options">
                        <label class="delivery-option" [class.selected]="checkoutForm.get('deliveryMethod')?.value === 'Pickup'">
                            <input type="radio" formControlName="deliveryMethod" value="Pickup"/>
                            <span class="option-icon">🏪</span>
                            <span class="option-label">Pickup</span>
                            <span class="option-sub">Ready in 2 hours</span>
                        </label>
                        <label class="delivery-option" [class.selected]="checkoutForm.get('deliveryMethod')?.value === 'Delivery'">
                            <input type="radio" formControlName="deliveryMethod" value="Delivery"/>
                            <span class="option-icon">🚚</span>
                            <span class="option-label">Delivery</span>
                            <span class="option-sub">1-2 business days</span>
                        </label>     
                    </div>
                 </div>

                 <button type="submit" class="place-order-btn" [disabled]="checkoutForm.invalid || loading">
                    {{loading ? 'Placing Order... ' : 'Place Order →'}}
                 </button>
            </form>
        </div>

        <div class="order-summary">
            <h3> Order Summary</h3>
            @for(item of cartItems; track item.id){
                <div class="summary-item">
                    <img [src]="item.image" [alt]="item.name"/>
                    <div class="summary-item-info">
                        <p class="summary-item-name">{{item.name}}</p>
                        <p class="summary-item-qty">{{item.quantity}}</p>
                    </div>
                    <p class="summary-item-price">€{{(item.price * item.quantity).toFixed(2)}}</p>
                </div>
            }
            <div class="summary-divider"></div>
            <div class="summary-total">
                <span>Total</span>
                <span>€{{getTotal().toFixed(2)}}</span>
            </div>
        </div>
    </div>

</div>
