@if(order){
  <div class="confirmation-wrapper">
    <div class="success-icon">✓</div>
    <h2>Order Placed!</h2>
    <p class="confirmation-sub">Thank you! Your order has been received.</p>

    <div class="confirmation-card">
      <div class="confirmation-row">
        <span>Order ID</span>
        <span>#{{order.id}}</span>
      </div>
      <div class="confirmation-row">
        <span>Status</span>
        <span class="status-badge">{{order.status}}</span>
      </div>
      <div class="confirmation-row">
        <span>Delivery</span>
        <span>{{order.delivery_method}}</span>
      </div>
      <div class="confirmation-divider"></div>
      <div class="confirmation-row total">
        <span>Total Paid</span>
        <span>€{{order.total_amount}}</span>
      </div>
    </div>

    <div class="confirmation-actions">
      <button class="btn-orders" routerLink="/my-orders">View My Orders</button>
      <button class="btn-home" routerLink="/">Continue Shopping</button>
    </div>
  </div>
} @else {
  <div class="confirmation-wrapper">
    <p class="no-order">No order found. <a routerLink="/">Go back home</a></p>
  </div>
}
