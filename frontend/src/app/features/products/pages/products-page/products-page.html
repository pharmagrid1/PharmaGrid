<div class="products-grid">
    @for(product of products; track product.id){
        <app-product-card 
        [brand]="product.brand"
        [name]="product.name"
        [price]="product.price"
        [skinType]="product.skinType"
        [image]="product.image"
        >

        </app-product-card>
    }

</div>
