<mat-card class="product-card mat-elevation-z1">

    <img mat-card-image [src]="image"  />

    <mat-card-content>
        <p class="brand">{{brand}}</p>
        <h3 class="name">{{name}}</h3>

        <mat-chip color="tertiary" selected>
            {{skinType}}
        </mat-chip>

        <p class="price">€{{price}}</p>
    </mat-card-content>

    <mat-card-actions>
        <button 
        mat-stroked-button 
        color="primary"
        [routerLink]="['/product', name]">
            View Details
        </button>
        <button mat-flat-button color="primary"
        (click)="addToCart()">
        Add to Cart
        </button>
    </mat-card-actions>
</mat-card>
